<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Abasto de Barrio - BarrioPro</title>
    
    <!-- PWA Manifest & App Theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    
    <!-- Standard Favicon and Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-192.png" />
    
    <!-- iOS / Safari Native Web App Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BarrioPro" />
    <link rel="apple-touch-icon" href="/pwa-icon-512.png" />

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registrado con éxito en el ámbito:', registration.scope);
            })
            .catch((error) => {
              console.error('Fallo en el registro del Service Worker:', error);
            });
        });
      }
    </script>
  </head>
  <body class="safe-top safe-bottom">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
